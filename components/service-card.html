<!--
  SERVICE CARD — one entry inside a .service-grid.
  Replace: {{SERVICE_NAME}}, {{SERVICE_DURATION}}, {{SERVICE_PRICE}}, {{SERVICE_DESCRIPTION}}
-->
<div class="service-card reveal">
  <div class="service-card-head">
    <h3 class="service-name">{{SERVICE_NAME}}</h3>
    <div class="service-meta">
      <span class="service-duration">{{SERVICE_DURATION}}</span>
      <span class="service-price">{{SERVICE_PRICE}}</span>
    </div>
  </div>
  <p class="service-description">{{SERVICE_DESCRIPTION}}</p>
</div>
