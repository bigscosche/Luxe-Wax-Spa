<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Transactions — Admin</title>
  <link rel="stylesheet" href="/admin/assets/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/config.local.js"></script>
  <script src="/admin/assets/admin.js" defer></script>
</head>
<body>
  <div class="shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main">
      <div class="page-head">
        <div>
          <div class="eyebrow">Money</div>
          <h2>Transactions</h2>
          <p>Log income and expenses — anything outside the normal service flow.</p>
        </div>
        <span class="meta" id="count"></span>
      </div>

      <section class="kpis" id="summaryCards"></section>

      <section class="card" id="add-transaction">
        <div class="form-intro">
          <div>
            <h3>Log a transaction</h3>
            <p>Pick income or expense, then fill in the amount.</p>
          </div>
        </div>
        <form class="inline-form" id="addForm">
          <div class="field" style="grid-column: 1 / -1;">
            <label>Type</label>
            <div class="seg income" id="typeSeg">
              <button type="button" data-type="income" class="active">Income</button>
              <button type="button" data-type="expense">Expense</button>
            </div>
            <input type="hidden" name="type" value="income" />
          </div>
          <div class="field">
            <label>Amount</label>
            <input name="amount" type="number" min="0" step="0.01" required placeholder="0.00" />
          </div>
          <div class="field">
            <label>Date</label>
            <input name="transaction_date" type="date" required />
          </div>
          <div class="field">
            <label>Category</label>
            <select name="category"></select>
          </div>
          <div class="field">
            <label>Description</label>
            <input name="description" placeholder="Optional" />
          </div>
          <button type="submit">Log transaction</button>
        </form>
        <p class="status" id="addStatus"></p>
      </section>

      <section class="card">
        <div class="card-head">
          <div>
            <h3>History</h3>
            <p>Filter by type to focus on income or expenses.</p>
          </div>
        </div>
        <div class="toolbar">
          <select id="filterType" style="max-width:180px">
            <option value="">All types</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
          <a class="btn ghost tiny" href="#add-transaction">Log another</a>
        </div>
        <div id="list"><p class="empty">Loading…</p></div>
      </section>
    </main>
  </div>

  <script>
    const DEFAULT_TRANSACTION_CATEGORY = {
      income: 'Service',
      expense: 'Supplies',
    };
    let isSavingTransaction = false;

    document.addEventListener('DOMContentLoaded', async () => {
      const session = await requireAuth();
      if (!session) return;
      renderSidebar('transactions', session);

      const form = document.getElementById('addForm');
      form.transaction_date.value = new Date().toISOString().slice(0, 10);
      populateCategoryOptions();
      applyDefaultTransactionCategory();
      bindTypeSegmented();

      await loadSummary();
      await loadTransactions();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (isSavingTransaction) return;
        const status = document.getElementById('addStatus');
        isSavingTransaction = true;
        setFormBusy(form, true, 'Saving...');
        setStatus(status, '');
        const payload = {
          type: form.type.value,
          amount: Number(form.amount.value),
          category: normalizeTransactionCategory(form.category.value.trim()) || null,
          description: form.description.value.trim() || null,
          transaction_date: form.transaction_date.value,
        };
        const { error } = await sb.from('transactions').insert(payload);
        if (error) {
          setStatus(status, 'Could not save the transaction. Please try again.', 'err');
          isSavingTransaction = false;
          setFormBusy(form, false);
          return;
        }
        setStatus(status, 'Transaction recorded.', 'ok');
        form.reset();
        form.transaction_date.value = new Date().toISOString().slice(0, 10);
        setTransactionType('income');
        rememberAdminFlowContext({
          recent_action: 'transaction_recorded',
        });
        notifyAdminDataChanged('transactions');
        await Promise.all([loadSummary(), loadTransactions()]);
        isSavingTransaction = false;
        setFormBusy(form, false);
        flashFormSuccess(form, 'Recorded');
      });

      document.getElementById('filterType').addEventListener('change', loadTransactions);
    });

    async function loadTransactions() {
      const type = document.getElementById('filterType').value;
      let query = sb.from('transactions')
        .select('id, amount, type, category, description, transaction_date, created_at')
        .order('transaction_date', { ascending: false })
        .order('created_at', { ascending: false });

      if (type) query = query.eq('type', type);

      const { data, error } = await query;
      const list = document.getElementById('list');
      if (error) {
        list.innerHTML = '<p class="empty">Could not load transactions right now.</p>';
        return;
      }

      const rows = data || [];
      document.getElementById('count').textContent = `${rows.length} shown`;
      if (rows.length === 0) {
        list.innerHTML = type
          ? '<p class="empty">Nothing here yet. Try the other type or log something new.</p>'
          : `<div class="empty">Log your first transaction to track revenue.<div class="page-actions" style="justify-content:center; margin-top:0.9rem"><a class="btn" href="#add-transaction">Log your first transaction</a></div></div>`;
        return;
      }

      list.innerHTML = `<div class="table-wrap"><table><thead><tr>
        <th>Date</th><th>Type</th><th>Amount</th><th>Category</th><th>Description</th><th></th>
      </tr></thead><tbody>${rows.map(row => `<tr>
        <td>${fmtDate(row.transaction_date)}</td>
        <td><span class="badge ${row.type === 'income' ? 'completed' : 'low'}">${escapeHtml(fmtTransactionType(row.type))}</span></td>
        <td>${fmtMoney(row.amount)}</td>
        <td>${escapeHtml(normalizeTransactionCategory(row.category) || '—')}</td>
        <td>${escapeHtml(row.description || '—')}</td>
        <td><div class="row-actions"><button class="ghost tiny" data-delete="${row.id}">Delete</button></div></td>
      </tr>`).join('')}</tbody></table></div>`;

      document.querySelectorAll('[data-delete]').forEach(btn => btn.addEventListener('click', async () => {
        if (!confirm('Delete this transaction?')) return;
        await sb.from('transactions').delete().eq('id', btn.dataset.delete);
        notifyAdminDataChanged('transactions');
        await Promise.all([loadSummary(), loadTransactions()]);
      }));
    }

    async function loadSummary() {
      const summaryEl = document.getElementById('summaryCards');
      const today = new Date();
      const start = new Date(today);
      start.setDate(start.getDate() - 6);

      const from = start.toISOString().slice(0, 10);
      const to = today.toISOString().slice(0, 10);

      const { data, error } = await sb.from('transactions')
        .select('amount, type, transaction_date')
        .gte('transaction_date', from)
        .lte('transaction_date', to);

      if (error) {
        console.error('[transactions] loadSummary failed:', error.message);
        summaryEl.innerHTML = `
          <div class="kpi bad">
            <div class="label">Income, last 7 days</div>
            <div class="value">—</div>
            <div class="subvalue">Summary unavailable right now</div>
          </div>
          <div class="kpi bad">
            <div class="label">Expenses, last 7 days</div>
            <div class="value">—</div>
            <div class="subvalue">Summary unavailable right now</div>
          </div>
          <div class="kpi bad">
            <div class="label">Net profit, last 7 days</div>
            <div class="value">—</div>
            <div class="subvalue">Summary unavailable right now</div>
          </div>
        `;
        return;
      }

      const rows = data || [];
      const income = rows.reduce((sum, row) =>
        row.type === 'income' ? sum + Number(row.amount || 0) : sum, 0);
      const expenses = rows.reduce((sum, row) =>
        row.type === 'expense' ? sum + Number(row.amount || 0) : sum, 0);
      const net = income - expenses;

      summaryEl.innerHTML = `
        <div class="kpi good">
          <div class="label">Income this week</div>
          <div class="value">${fmtMoney(income)}</div>
          <div class="subvalue">last 7 days</div>
        </div>
        <div class="kpi ${expenses > 0 ? 'warn' : ''}">
          <div class="label">Expenses this week</div>
          <div class="value">${fmtMoney(expenses)}</div>
          <div class="subvalue">last 7 days</div>
        </div>
        <div class="kpi ${net < 0 ? 'bad' : 'good'}">
          <div class="label">Net this week</div>
          <div class="value">${fmtMoney(net)}</div>
          <div class="subvalue">${net < 0 ? 'spending more than earning' : 'income minus expenses'}</div>
        </div>
      `;
    }

    function populateCategoryOptions() {
      const select = document.querySelector('select[name="category"]');
      select.innerHTML = '<option value="">Select category…</option>' +
        TRANSACTION_CATEGORIES.map(category => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`).join('');
    }

    function applyDefaultTransactionCategory() {
      const form = document.getElementById('addForm');
      const suggested = DEFAULT_TRANSACTION_CATEGORY[form.type.value] || '';
      if (!suggested) return;
      if (!form.category.value || Object.values(DEFAULT_TRANSACTION_CATEGORY).includes(form.category.value)) {
        form.category.value = suggested;
      }
    }

    function bindTypeSegmented() {
      const seg = document.getElementById('typeSeg');
      if (!seg) return;
      seg.querySelectorAll('button[data-type]').forEach((btn) => {
        btn.addEventListener('click', () => setTransactionType(btn.dataset.type));
      });
    }

    function setTransactionType(nextType) {
      const form = document.getElementById('addForm');
      const seg = document.getElementById('typeSeg');
      if (!form || !seg) return;
      form.type.value = nextType;
      seg.classList.toggle('income', nextType === 'income');
      seg.classList.toggle('expense', nextType === 'expense');
      seg.querySelectorAll('button[data-type]').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.type === nextType);
      });
      applyDefaultTransactionCategory();
    }
  </script>
</body>
</html>
