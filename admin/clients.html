<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Clients — Admin</title>
  <link rel="stylesheet" href="/admin/assets/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/config.local.js"></script>
  <script src="/admin/assets/admin.js" defer></script>
</head>
<body>
  <div class="shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main">
      <div class="page-head">
        <div>
          <div class="eyebrow">People</div>
          <h2>Clients</h2>
          <p>Add a client, then book their first appointment.</p>
        </div>
        <span class="meta" id="count"></span>
      </div>

      <section class="card" id="add-client">
        <div class="form-intro">
          <div>
            <h3>Add a client</h3>
            <p>Name and phone are usually all you need to start.</p>
          </div>
        </div>
        <form class="inline-form" id="addForm">
          <div class="field"><label>Name</label><input name="name" required placeholder="First and last" /></div>
          <div class="field"><label>Phone</label><input name="phone" type="tel" placeholder="(555) 555-5555" /></div>
          <details class="more-fields">
            <summary>Add email or a note</summary>
            <div class="more-grid">
              <div class="field"><label>Email</label><input name="email" type="email" /></div>
              <div class="field"><label>Note</label><input name="notes" placeholder="Allergies, preferences…" /></div>
            </div>
          </details>
          <button type="submit">Add client</button>
        </form>
        <p class="status" id="addStatus"></p>
        <div class="page-actions" id="postAddActions" hidden>
          <span class="helper-chip">Next step</span>
          <a class="btn" id="bookNewClientBtn" href="/admin/appointments.html#add-appointment">Book appointment for this client</a>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <div>
            <h3>Your clients</h3>
            <p>Search by name, phone, or email.</p>
          </div>
        </div>
        <div class="toolbar">
          <input id="search" placeholder="Search clients…" style="max-width:340px" />
        </div>
        <div id="list"><p class="empty">Loading…</p></div>
      </section>
    </main>
  </div>

  <script>
    let allClients = [];
    let isSavingClient = false;

    document.addEventListener('DOMContentLoaded', async () => {
      const session = await requireAuth();
      if (!session) return;
      renderSidebar('clients', session);
      await loadClients();

      document.getElementById('addForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (isSavingClient) return;
        const f = e.target;
        const status = document.getElementById('addStatus');
        isSavingClient = true;
        setFormBusy(f, true, 'Saving...');
        setStatus(status, '');
        const payload = {
          name: f.name.value.trim(),
          phone: f.phone.value.trim() || null,
          email: f.email.value.trim() || null,
          notes: f.notes.value.trim() || null,
        };
        const { error } = await sb.from('clients').insert(payload);
        if (error) {
          setStatus(status, 'Could not add client right now. Please try again.', 'err');
          document.getElementById('postAddActions').hidden = true;
          isSavingClient = false;
          setFormBusy(f, false);
          return;
        }
        setStatus(status, 'Client saved.', 'ok');
        await loadClients();
        const matchingClient = allClients.find((client) =>
          client.name === payload.name &&
          (client.phone || null) === payload.phone &&
          (client.email || null) === payload.email
        );
        if (matchingClient) {
          rememberRecentClient(matchingClient);
          rememberAdminFlowContext({
            selected_client_id: matchingClient.id,
            selected_client_name: matchingClient.name,
            recent_action: 'client_saved',
          });
        }
        const postAddActions = document.getElementById('postAddActions');
        const bookBtn = document.getElementById('bookNewClientBtn');
        bookBtn.href = matchingClient
          ? `/admin/appointments.html?client=${encodeURIComponent(matchingClient.id)}#add-appointment`
          : '/admin/appointments.html#add-appointment';
        bookBtn.textContent = `Book appointment for ${payload.name}`;
        postAddActions.hidden = false;
        notifyAdminDataChanged('clients');
        f.reset();
        isSavingClient = false;
        setFormBusy(f, false);
        flashFormSuccess(f, 'Saved');
      });

      document.getElementById('search').addEventListener('input', renderList);
    });

    async function loadClients() {
      const { data, error } = await sb.from('clients')
        .select('id, name, phone, email, notes, created_at, appointments(price, status, appointment_date)')
        .order('created_at', { ascending: false });
      if (error) {
        allClients = [];
        document.getElementById('count').textContent = '';
        document.getElementById('list').innerHTML = '<p class="empty">Something went wrong. Try again.</p>';
        return;
      }
      allClients = data || [];
      document.getElementById('count').textContent = `${allClients.length} total`;
      renderList();
    }

    function renderList() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      const rows = allClients.filter(c =>
        !q ||
        (c.name || '').toLowerCase().includes(q) ||
        (c.email || '').toLowerCase().includes(q) ||
        (c.phone || '').toLowerCase().includes(q)
      );
      const el = document.getElementById('list');
      if (rows.length === 0) {
        el.innerHTML = q
          ? '<p class="empty">No match. Try a different name, phone, or email.</p>'
          : `<div class="empty">Start by adding your first client.<div class="page-actions" style="justify-content:center; margin-top:0.9rem"><a class="btn" href="#add-client">Add your first client</a></div></div>`;
        return;
      }
      el.innerHTML = `<div class="table-wrap"><table><thead><tr>
        <th>Name</th><th>Phone</th><th>Email</th><th>Visits</th><th>Total spent</th><th>Last visit</th><th>Notes</th><th>Added</th><th></th>
      </tr></thead><tbody>${rows.map(c => `<tr>
        <td>${escapeHtml(c.name)}</td>
        <td>${escapeHtml(c.phone || '—')}</td>
        <td>${escapeHtml(c.email || '—')}</td>
        <td>${clientVisitCount(c)}</td>
        <td>${fmtMoney(clientTotalSpent(c))}</td>
        <td>${fmtDate(clientLastVisit(c))}</td>
        <td>${renderClientNote(c)}</td>
        <td class="mono">${fmtDate(c.created_at)}</td>
        <td><div class="row-actions">
          <button class="ghost tiny" data-quick-note="${c.id}">Quick note</button>
          <button class="ghost tiny" data-edit="${c.id}">Edit notes</button>
          <button class="ghost tiny" data-delete="${c.id}">Delete</button>
        </div></td>
      </tr>`).join('')}</tbody></table></div>`;

      document.querySelectorAll('[data-quick-note]').forEach(btn => btn.addEventListener('click', async () => {
        const id = btn.dataset.quickNote;
        const current = allClients.find(c => c.id === id);
        const next = prompt('Add quick note:', '');
        if (next === null || !next.trim()) return;
        const combined = appendQuickNote(stripClientFollowUpMeta(current?.notes), next.trim());
        const meta = parseClientFollowUpMeta(current?.notes);
        btn.disabled = true;
        const { error } = await sb.from('clients')
          .update({ notes: buildClientNotesWithFollowUpMeta(combined, meta), updated_at: new Date().toISOString() })
          .eq('id', id);
        if (error) {
          setStatus(document.getElementById('addStatus'), 'Something went wrong. Try again.', 'err');
          btn.disabled = false;
          return;
        }
        notifyAdminDataChanged('clients');
        await loadClients();
      }));
      document.querySelectorAll('[data-edit]').forEach(btn => btn.addEventListener('click', async () => {
        const id = btn.dataset.edit;
        const current = allClients.find(c => c.id === id);
        const next = prompt('Notes:', stripClientFollowUpMeta(current?.notes) || '');
        if (next === null) return;
        const meta = parseClientFollowUpMeta(current?.notes);
        btn.disabled = true;
        const { error } = await sb.from('clients')
          .update({ notes: buildClientNotesWithFollowUpMeta(next, meta), updated_at: new Date().toISOString() })
          .eq('id', id);
        if (error) {
          setStatus(document.getElementById('addStatus'), 'Something went wrong. Try again.', 'err');
          btn.disabled = false;
          return;
        }
        notifyAdminDataChanged('clients');
        await loadClients();
      }));
      document.querySelectorAll('[data-delete]').forEach(btn => btn.addEventListener('click', async () => {
        if (!confirm('Delete this client and all their appointments? This cannot be undone.')) return;
        btn.disabled = true;
        const { error } = await sb.from('clients').delete().eq('id', btn.dataset.delete);
        if (error) {
          setStatus(document.getElementById('addStatus'), 'Something went wrong. Try again.', 'err');
          btn.disabled = false;
          return;
        }
        notifyAdminDataChanged('clients');
        await loadClients();
      }));
    }

    function completedAppointments(client) {
      return (client.appointments || []).filter(appt => appt.status === 'completed');
    }

    function clientVisitCount(client) {
      return completedAppointments(client).length;
    }

    function clientTotalSpent(client) {
      return completedAppointments(client).reduce((sum, appt) => sum + Number(appt.price || 0), 0);
    }

    function clientLastVisit(client) {
      const dates = completedAppointments(client)
        .map(appt => appt.appointment_date)
        .filter(Boolean)
        .sort((a, b) => new Date(b) - new Date(a));
      return dates[0] || null;
    }

    function appendQuickNote(existingNotes, nextNote) {
      const datedNote = `${new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}: ${nextNote}`;
      return [String(existingNotes || '').trim(), datedNote].filter(Boolean).join('\n');
    }

    function renderClientNote(client) {
      const note = stripClientFollowUpMeta(client.notes);
      if (!note) return '<span class="muted">No note</span>';
      const lines = note.split('\n').filter(Boolean);
      const preview = lines.slice(0, 2).join('\n');
      const extra = lines.length > 2 ? `<div class="muted">+${lines.length - 2} more</div>` : '';
      return `<div class="note-preview">${escapeHtml(preview)}</div>${extra}`;
    }
  </script>
</body>
</html>
