<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Reset Password — Admin</title>
  <link rel="stylesheet" href="/admin/assets/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/config.local.js"></script>
  <script src="/admin/assets/admin.js" defer></script>
</head>
<body>
  <div class="login-shell">
    <!-- State: loading -->
    <div id="loading" class="login-card" style="text-align:center">
      <h1>Reset password</h1>
      <p class="sub">Checking your link…</p>
    </div>

    <!-- State: request a reset link -->
    <form id="requestForm" class="login-card" style="display:none">
      <h1>Reset password</h1>
      <p class="sub">Enter the owner email. A recovery link will be sent.</p>
      <div class="field">
        <label for="reqEmail">Email</label>
        <input id="reqEmail" type="email" autocomplete="username" required />
      </div>
      <button type="submit" id="reqBtn">Send reset link</button>
      <p id="reqStatus" class="status"></p>
      <p class="sub" style="margin-top:1rem">
        <a href="/admin/login.html">Back to sign in</a>
      </p>
    </form>

    <!-- State: set new password (after clicking recovery link) -->
    <form id="recoveryForm" class="login-card" style="display:none">
      <h1>Set a new password</h1>
      <p class="sub">Choose a strong password (min 8 characters).</p>
      <div class="field">
        <label for="newPass">New password</label>
        <input id="newPass" type="password" autocomplete="new-password" minlength="8" required />
      </div>
      <div class="field">
        <label for="confirmPass">Confirm password</label>
        <input id="confirmPass" type="password" autocomplete="new-password" minlength="8" required />
      </div>
      <button type="submit" id="recBtn">Update password</button>
      <p id="recStatus" class="status"></p>
    </form>

    <!-- State: done -->
    <div id="doneCard" class="login-card" style="display:none; text-align:center">
      <h1>Password updated</h1>
      <p class="sub">Redirecting you to sign in…</p>
    </div>
  </div>

  <script>
    const RESET_REDIRECT = window.location.origin + '/admin/reset-password.html';
    let recoveryActive = false;

    function show(which) {
      ['loading', 'requestForm', 'recoveryForm', 'doneCard'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.display = (id === which) ? (el.tagName === 'FORM' ? 'block' : 'block') : 'none';
      });
    }

    // Register BEFORE Supabase parses the URL fragment, so we catch the
    // PASSWORD_RECOVERY event emitted when the library processes the hash.
    sb.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        recoveryActive = true;
        show('recoveryForm');
      }
    });

    // Fallback router: if no recovery event fires, decide based on the URL.
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (recoveryActive) return;
        const hash = window.location.hash || '';
        if (hash.includes('type=recovery')) return;  // event is likely in-flight

        // Supabase returns error details in the hash when links expire.
        if (hash.includes('error=')) {
          const params = new URLSearchParams(hash.substring(1));
          const desc = params.get('error_description') || 'This reset link is invalid or has expired.';
          show('requestForm');
          setStatus(document.getElementById('reqStatus'), decodeURIComponent(desc.replace(/\+/g, ' ')), 'err');
          return;
        }

        show('requestForm');
      }, 600);
    });

    // Request a reset email.
    document.getElementById('requestForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('reqBtn');
      const status = document.getElementById('reqStatus');
      const email = document.getElementById('reqEmail').value.trim();
      btn.disabled = true; btn.textContent = 'Sending…';
      setStatus(status, '');

      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: RESET_REDIRECT });
      if (error) {
        setStatus(status, error.message || 'Could not send reset link.', 'err');
        btn.disabled = false; btn.textContent = 'Send reset link';
        return;
      }
      // Don't confirm the email exists — same message either way.
      setStatus(status, 'If that email is on file, a reset link is on its way. Check your inbox.', 'ok');
      btn.textContent = 'Sent';
    });

    // Submit a new password.
    document.getElementById('recoveryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('recBtn');
      const status = document.getElementById('recStatus');
      const pw = document.getElementById('newPass').value;
      const confirm = document.getElementById('confirmPass').value;

      if (pw.length < 8)  { setStatus(status, 'Password must be at least 8 characters.', 'err'); return; }
      if (pw !== confirm) { setStatus(status, 'Passwords do not match.', 'err'); return; }

      btn.disabled = true; btn.textContent = 'Updating…';
      setStatus(status, '');

      const { error } = await sb.auth.updateUser({ password: pw });
      if (error) {
        setStatus(status, error.message || 'Could not update password.', 'err');
        btn.disabled = false; btn.textContent = 'Update password';
        return;
      }

      // Sign out the recovery session so the owner enters fresh credentials.
      await sb.auth.signOut();
      show('doneCard');
      setTimeout(() => location.replace('/admin/login.html'), 1400);
    });
  </script>
</body>
</html>
