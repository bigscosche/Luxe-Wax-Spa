<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Reset Password — Admin</title>
  <link rel="stylesheet" href="/admin/assets/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/config.local.js"></script>
  <script src="/admin/assets/admin.js" defer></script>
</head>
<body>
  <div class="login-shell">
    <!-- State: loading -->
    <div id="loading" class="login-card" style="text-align:center">
      <h1>Reset password</h1>
      <p class="sub">Checking your link…</p>
    </div>

    <!-- State: request a reset link -->
    <form id="requestForm" class="login-card" style="display:none">
      <h1>Reset password</h1>
      <p class="sub">Enter the owner email. A recovery link will be sent.</p>
      <div class="field">
        <label for="reqEmail">Email</label>
        <input id="reqEmail" type="email" autocomplete="username" required />
      </div>
      <button type="submit" id="reqBtn">Send reset link</button>
      <p id="reqStatus" class="status"></p>
      <p class="sub" style="margin-top:1rem">
        <a href="/admin/login.html">Back to sign in</a>
      </p>
    </form>

    <!-- State: set new password (after clicking recovery link) -->
    <form id="recoveryForm" class="login-card" style="display:none">
      <h1>Set a new password</h1>
      <p class="sub">Choose a strong password (min 8 characters).</p>
      <div class="field">
        <label for="newPass">New password</label>
        <input id="newPass" type="password" autocomplete="new-password" minlength="8" required />
      </div>
      <div class="field">
        <label for="confirmPass">Confirm password</label>
        <input id="confirmPass" type="password" autocomplete="new-password" minlength="8" required />
      </div>
      <button type="submit" id="recBtn">Update password</button>
      <p id="recStatus" class="status"></p>
    </form>

    <!-- State: done -->
    <div id="doneCard" class="login-card" style="display:none; text-align:center">
      <h1>Password updated</h1>
      <p class="sub">Redirecting you to sign in…</p>
    </div>
  </div>

  <script>
    const RESET_REDIRECT = window.location.origin + '/admin/reset-password.html';

    function show(which) {
      ['loading', 'requestForm', 'recoveryForm', 'doneCard'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.display = id === which ? 'block' : 'none';
      });
    }

    function readHashParams() {
      return new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
    }

    function clearHash() {
      if (!window.location.hash) return;
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }

    function decodeHashMessage(value, fallback) {
      if (!value) return fallback;
      return decodeURIComponent(value.replace(/\+/g, ' '));
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const requestForm = document.getElementById('requestForm');
      const recoveryForm = document.getElementById('recoveryForm');
      const reqStatus = document.getElementById('reqStatus');
      const recStatus = document.getElementById('recStatus');
      let recoverySessionActive = false;

      sb.auth.onAuthStateChange((event) => {
        if (event === 'PASSWORD_RECOVERY') {
          recoverySessionActive = true;
          show('recoveryForm');
        }
      });

      async function routeFromRecoveryLink() {
        const hash = readHashParams();
        const accessToken = hash.get('access_token');
        const refreshToken = hash.get('refresh_token');
        const hashType = hash.get('type');
        const hashError = hash.get('error');
        const hashErrorDescription = hash.get('error_description');

        if (hashError) {
          clearHash();
          show('requestForm');
          setStatus(
            reqStatus,
            decodeHashMessage(hashErrorDescription, 'This reset link is invalid or has expired.'),
            'err'
          );
          return;
        }

        if (accessToken && refreshToken) {
          const { error } = await sb.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken,
          });

          clearHash();

          if (error) {
            show('requestForm');
            setStatus(reqStatus, error.message || 'This reset link is invalid or has expired.', 'err');
            return;
          }

          if (hashType === 'recovery') recoverySessionActive = true;
        }

        const { data: { session } } = await sb.auth.getSession();
        if (recoverySessionActive || (session && hashType === 'recovery')) {
          show('recoveryForm');
          return;
        }

        show('requestForm');
      }

      requestForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('reqBtn');
        const email = document.getElementById('reqEmail').value.trim();
        btn.disabled = true;
        btn.textContent = 'Sending…';
        setStatus(reqStatus, '');

        const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: RESET_REDIRECT });
        if (error) {
          setStatus(reqStatus, error.message || 'Could not send reset link.', 'err');
          btn.disabled = false;
          btn.textContent = 'Send reset link';
          return;
        }

        setStatus(reqStatus, 'If that email is on file, a reset link is on its way. Check your inbox.', 'ok');
        btn.textContent = 'Sent';
      });

      recoveryForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('recBtn');
        const pw = document.getElementById('newPass').value;
        const confirm = document.getElementById('confirmPass').value;

        if (pw.length < 8) {
          setStatus(recStatus, 'Password must be at least 8 characters.', 'err');
          return;
        }
        if (pw !== confirm) {
          setStatus(recStatus, 'Passwords do not match.', 'err');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Updating…';
        setStatus(recStatus, '');

        const { error } = await sb.auth.updateUser({ password: pw });
        if (error) {
          setStatus(recStatus, error.message || 'Could not update password.', 'err');
          btn.disabled = false;
          btn.textContent = 'Update password';
          return;
        }

        await sb.auth.signOut();
        show('doneCard');
        setTimeout(() => location.replace('/admin/login.html'), 1400);
      });

      await routeFromRecoveryLink();
    });
  </script>
</body>
</html>
